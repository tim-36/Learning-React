<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="js-container"></div>

    <--!Load files--

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function Button({text, onClick}) {
        return(
          <button onClick={onClick}>
            {text}
          </button>
        );
      }
      
      
      function ChatInput({chatMessages, setChatMessages}) {

        //gain any text from ChaptInput(which is a textbox)
        const [inputText,setInputText] = React.useState("");

        function saveInputText(event){
          setInputText(event.target.value);
        }

        //generating HTML with chatMessages...
        //"..." spread operater that copies elements
        //now user data can be updated with whats in ChatInput(text)
        //using messgae = inputText thus HTML is updated
        function sendMessage() {

          const newChatMessgaes = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID()
            }
          ]
          setChatMessages(newChatMessgaes);

          // chatbot response
          const response = Chatbot.getResponse(inputText);
          setChatMessages([
            ...newChatMessgaes,
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID()
            }
          ]);

          //removing text after entering
          setInputText("");
        }


        return (
          //fraqment allows us to group elements
          <section className="chat-input-container">          
            <input
              placeholder="Send a message to Chatbot..." 
              size="30"
              //runs a func when theres a change inside
              onChange={saveInputText}
              //Controled input - allows for changes in input element/textbox
              //if inputText is empty then HTML will be empty as well
              value={inputText}
              className="chat-input"
            />
            <button
              onClick={sendMessage}
              className="send-button">
                Send              
            </button>
          </section>
        );
      }

      function ChatMessage({message,sender}) {

        const [isLoading, setIsLoading] = React.useState(
          sender === "robot"
        );

        React.useEffect(() => {

          if(sender === "robot") {
            setTimeout(() => {
              setIsLoading(false);
            },1000);
        }
      },[]);

        //props make our componets reuseable 
        // also a decontsrut of const message = props.message;
        //allows us to use vaiables driectly from 
        //const{message,sender} = props;  ->     

        // if(sender === 'robot') {
        //   return(
        //     <div>
        //       {message}
        //     </div>
        //   );
        // }

        return (

          <section className = {
              sender==="user" 
              ? "chat-message-user" 
              : "chat-message-robot"}
            >

            {sender==="robot" &&  (
              <img src="images/robot.png"/>
            )}

            <div className="chat-message-text">

              {
                isLoading ? "Chatbot is thinking..." : message
              }

            </div>
            
            {sender==="user" && (
              <img src="images/user.png"/>
            )}
          </section>
        );
      }

      function ChatMessages({chatMessages}) { 
        
        //Auto save HTML elemnet into component
        //returns a ref like Object
        const chatMessagesRef = React.useRef(null);

        //Hooks shold be at the top of componets only
        //this will be run after bein made and after every change
        //2nd para [] (dependacy array -> conrols when chnages shoudl 
        // happen thus when this method runs 
        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;

          if(containerElem) {
            //scrollTop = how far from top to scroll
            //scrollHeight- ref to the bottom
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);
        
        return(
          <div className="chat-messages-container"
          ref={chatMessagesRef}> 
            {chatMessages.map((chatMessage) => {
                return(
                  <ChatMessage
                    message={chatMessage.message}
                    sender={chatMessage.sender}
                    key={chatMessage.id}
                  />
                );
              })}
          </div>
        )
        
      }      

      function App() { 
        
        //converting data into state thus allowin for update of HTML
        //THis is a Hook that put in a React method as React.
        const [chatMessages, setChatMessages] = React.useState([{
          message: "hello chabot",
          sender: "user",
          id:"id1"
        }, 
        {
          message: "ello, how can I help you",
          sender: "robot",
          id:"id2"
        }]);

        //shows the current value of chatMessges:
        //following is chortcut of const chatMessages = array[0];
        // and const setChatMessages = array[1];
        //const [chatMessages, setChatMessages] = array;

        //updater function (setChatMessages) - we can upate the data in this way 
        //React knows that data has changed thus change the HTML
        //instead of directly where HTML wont change: like in chatMessages.push()
        
        //chatMessages was lifted the state up:
        // sharing the state between multiple compents 
        return(
          <div className="app-container">
              {/*componet syntex _ creating our own HTMl elements*/}

              {/*using props to share the state amoungst componts*/}
              {/*shared chatMessages bewteen ChatInput and ChatMessages*/}
              
              <ChatMessages 
                chatMessages={chatMessages}
              />
              <ChatInput 
                chatMessages={chatMessages}
                setChatMessages={setChatMessages}
              />
              
          </div>
        );
      }

      const container = document.querySelector('.js-container');    //put a html element into js container
      ReactDOM.createRoot(container).render(<App />);
    </script>

  </body>
</html>
